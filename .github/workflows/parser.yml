name: Ozon Parser

on:
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Запускаем парсер
        run: python3 run_parser.py
      - uses: actions/upload-artifact@v4
        with:
          name: ozon-results
          path: ./*.csv
